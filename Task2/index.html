<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Calculator</h2>

    <input type="number" id="num1">

    <select id="operation">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>

    <input type="number" id="num2">

    <button onclick="calculate()">Calculate</button>

    <h3 id="result"></h3>
</div>

<script src="script.js"></script>
</body>
</html>
