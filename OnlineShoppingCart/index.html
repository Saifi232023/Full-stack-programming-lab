<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🛒 Online Shopping Cart</h1>

        <button onclick="addProducts()">Add Products</button>

        <div class="output">
            <p><strong>Total Items:</strong> <span id="total"></span></p>
            <p><strong>First Item:</strong> <span id="first"></span></p>
            <p><strong>Remaining Items:</strong> <span id="remaining"></span></p>
            <p><strong>Cloned Cart:</strong> <span id="cloned"></span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
